<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أكواد أعطال المكيفات - النسخة الشاملة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f8;--surface:#fff;--border:#d1dce8;--text:#1a2332;--muted:#6b7c93;
  --samsung:#1428a0;--lg:#a50034;--general:#cc0000;--haier:#0072bc;--geant:#1a7a3c;
  --midea:#e31837;--tosot:#0055a5;--wadi:#ff6b00;--balsan:#b8860b;--alhafidh:#2d7a2d;
  --compressor:#dc6b19;--electric:#b91c1c;--sensor:#0369a1;--refrigerant:#0d9488;--communication:#6b21a8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.header{background:linear-gradient(135deg,#0f172a,#1e3a5f,#0f172a);color:#fff;padding:0 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.3);}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:12px 0;gap:10px;flex-wrap:wrap;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#38bdf8,#0ea5e9);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 18px rgba(56,189,248,.4);flex-shrink:0;}
.logo h1{font-size:17px;font-weight:900;color:#e2e8f0;line-height:1.2;}
.logo p{font-size:10px;color:#94a3b8;letter-spacing:.8px;}
.hstats{display:flex;gap:8px;flex-wrap:wrap;}
.hstat{text-align:center;background:rgba(255,255,255,.07);padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);}
.hstat-n{font-size:18px;font-weight:900;color:#38bdf8;font-family:'IBM Plex Mono',monospace;}
.hstat-l{font-size:9px;color:#94a3b8;}

.search-area{background:linear-gradient(180deg,#1e3a5f,#f0f4f8);padding:22px 16px 18px;}
.search-inner{max-width:820px;margin:0 auto;}
.sbox{position:relative;margin-bottom:12px;}
.sbox input{width:100%;padding:14px 50px 14px 18px;border-radius:14px;border:2px solid var(--border);background:#fff;font-size:14px;font-family:'Cairo',sans-serif;color:var(--text);outline:none;transition:all .3s;box-shadow:0 4px 16px rgba(0,0,0,.07);}
.sbox input:focus{border-color:#1e40af;box-shadow:0 0 0 3px rgba(30,64,175,.1);}
.sbox input::placeholder{color:var(--muted);}
.sico{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;}

.brand-scroll{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.btab{padding:6px 13px;border-radius:24px;border:2px solid transparent;background:#fff;font-size:12px;font-family:'Cairo',sans-serif;cursor:pointer;font-weight:700;transition:all .2s;box-shadow:0 2px 6px rgba(0,0,0,.08);color:var(--muted);}
.btab.active,.btab:hover{color:#fff;}
.btab[data-b="all"].active{background:#0f172a;border-color:#0f172a;}
.btab[data-b="samsung"].active{background:var(--samsung);border-color:var(--samsung);}
.btab[data-b="lg"].active{background:var(--lg);border-color:var(--lg);}
.btab[data-b="general"].active{background:var(--general);border-color:var(--general);}
.btab[data-b="haier"].active{background:var(--haier);border-color:var(--haier);}
.btab[data-b="geant"].active{background:var(--geant);border-color:var(--geant);}
.btab[data-b="midea"].active{background:var(--midea);border-color:var(--midea);}
.btab[data-b="tosot"].active{background:var(--tosot);border-color:var(--tosot);}
.btab[data-b="wadi"].active{background:var(--wadi);border-color:var(--wadi);}
.btab[data-b="balsan"].active{background:var(--balsan);border-color:var(--balsan);}
.btab[data-b="alhafidh"].active{background:var(--alhafidh);border-color:var(--alhafidh);}

.tfilters{display:flex;gap:6px;flex-wrap:wrap;}
.tfbtn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:11px;font-family:'Cairo',sans-serif;cursor:pointer;transition:all .2s;color:var(--muted);}
.tfbtn.active{color:#fff;}
.tfbtn[data-t="all"].active{background:#475569;border-color:#475569;}
.tfbtn[data-t="compressor"].active{background:var(--compressor);border-color:var(--compressor);}
.tfbtn[data-t="electric"].active{background:var(--electric);border-color:var(--electric);}
.tfbtn[data-t="sensor"].active{background:var(--sensor);border-color:var(--sensor);}
.tfbtn[data-t="refrigerant"].active{background:var(--refrigerant);border-color:var(--refrigerant);}
.tfbtn[data-t="communication"].active{background:var(--communication);border-color:var(--communication);}

.main{max-width:1100px;margin:0 auto;padding:18px 16px;}
.rbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;font-size:12px;color:var(--muted);flex-wrap:wrap;gap:6px;}
.rbar span{color:#1e40af;font-weight:700;}
.verified-badge{font-size:10px;background:#dcfce7;color:#166534;padding:2px 8px;border-radius:10px;font-weight:700;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(305px,1fr));gap:12px;}

.card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 10px rgba(0,0,0,.05);cursor:pointer;transition:all .25s;animation:up .35s ease forwards;opacity:0;}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.11);border-color:#93c5fd;}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.card-top{padding:12px 14px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:8px;}
.ccode{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:700;padding:3px 9px;border-radius:7px;color:#fff;letter-spacing:1px;}
.cbrand-name{font-size:10px;font-weight:700;margin-top:2px;}
.cbadges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;}
.cbadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:16px;}

.card-body{padding:10px 14px;}
.fname{font-size:13px;font-weight:700;margin-bottom:6px;line-height:1.4;}
.finfo{font-size:11px;color:var(--muted);line-height:1.6;}
.finfo strong{color:var(--text);}

.card-foot{padding:9px 14px;background:#f8fafc;border-top:1px solid var(--border);font-size:11px;color:#166534;line-height:1.5;}
.foot-lbl{font-weight:700;color:#15803d;margin-bottom:2px;font-size:11px;}

.tb-compressor{background:#fef3c7;color:#92400e;}
.tb-electric{background:#fee2e2;color:#991b1b;}
.tb-sensor{background:#dbeafe;color:#1e40af;}
.tb-refrigerant{background:#ccfbf1;color:#134e4a;}
.tb-communication{background:#ede9fe;color:#5b21b6;}
.tb-other{background:#f1f5f9;color:#475569;}
.sev-high{background:#fee2e2;color:#991b1b;}
.sev-med{background:#fef3c7;color:#92400e;}
.sev-low{background:#dcfce7;color:#166534;}

.overlay{position:fixed;inset:0;background:rgba(15,23,42,.78);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px);}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:18px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;transform:scale(.92);transition:transform .3s;box-shadow:0 25px 60px rgba(0,0,0,.3);}
.overlay.open .modal{transform:scale(1);}
.mhead{padding:20px 20px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:12px;position:sticky;top:0;background:#fff;z-index:1;}
.mcode-big{font-family:'IBM Plex Mono',monospace;font-size:30px;font-weight:700;padding:5px 14px;border-radius:10px;color:#fff;display:inline-block;margin-bottom:5px;}
.mname{font-size:15px;font-weight:700;margin-bottom:6px;}
.mclose{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:#f1f5f9;color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.mclose:hover{background:#fee2e2;border-color:#fca5a5;}
.mbody{padding:18px;}
.msec{margin-bottom:16px;}
.msec-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding-bottom:6px;border-bottom:2px solid var(--border);margin-bottom:8px;}
.msec-title.cause{color:#b91c1c;border-color:#fee2e2;}
.msec-title.solution{color:#15803d;border-color:#dcfce7;}
.msec-title.type{color:#0369a1;border-color:#dbeafe;}
.msec-title.note{color:#dc6b19;border-color:#fef3c7;}
.msec-text{font-size:13px;line-height:1.9;}
.steps{list-style:none;}
.steps li{padding:7px 10px 7px 34px;position:relative;font-size:12px;line-height:1.7;border-radius:7px;margin-bottom:5px;background:#f8fafc;}
.steps li::before{content:attr(data-n);position:absolute;right:10px;top:9px;width:18px;height:18px;background:#1e40af;color:#fff;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}

.source-tag{font-size:10px;color:#94a3b8;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
.source-tag span{color:#1e40af;font-weight:600;}

.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty .ico{font-size:48px;margin-bottom:12px;}
.empty h3{font-size:17px;color:var(--text);margin-bottom:5px;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
  .hstats{display:none;}
  .mcode-big{font-size:24px;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">❄️</div>
      <div>
        <h1>أكواد أعطال المكيفات</h1>
        <p>AC FAULT CODE DIAGNOSTIC — 10 BRANDS — VERIFIED</p>
      </div>
    </div>
    <div class="hstats">
      <div class="hstat"><div class="hstat-n" id="sTot">0</div><div class="hstat-l">كود عطل</div></div>
      <div class="hstat"><div class="hstat-n">10</div><div class="hstat-l">ماركة</div></div>
    </div>
  </div>
</div>

<div class="search-area">
  <div class="search-inner">
    <div class="sbox">
      <input type="text" id="si" placeholder="ابحث بالكود مثل E1، CH05، F4، أو اسم العطل، أو الماركة..." oninput="render()">
      <span class="sico">🔍</span>
    </div>
    <div class="brand-scroll">
      <button class="btab active" data-b="all" onclick="setBrand('all',this)">🌐 الكل</button>
      <button class="btab" data-b="samsung" onclick="setBrand('samsung',this)">Samsung</button>
      <button class="btab" data-b="lg" onclick="setBrand('lg',this)">LG</button>
      <button class="btab" data-b="general" onclick="setBrand('general',this)">General</button>
      <button class="btab" data-b="haier" onclick="setBrand('haier',this)">Haier</button>
      <button class="btab" data-b="geant" onclick="setBrand('geant',this)">Géant</button>
      <button class="btab" data-b="midea" onclick="setBrand('midea',this)">Midea</button>
      <button class="btab" data-b="tosot" onclick="setBrand('tosot',this)">TOSOT/Gree</button>
      <button class="btab" data-b="wadi" onclick="setBrand('wadi',this)">WADI</button>
      <button class="btab" data-b="balsan" onclick="setBrand('balsan',this)">Balsan</button>
      <button class="btab" data-b="alhafidh" onclick="setBrand('alhafidh',this)">Alhafidh</button>
    </div>
    <div class="tfilters">
      <button class="tfbtn active" data-t="all" onclick="setType('all',this)">الكل</button>
      <button class="tfbtn" data-t="compressor" onclick="setType('compressor',this)">⚙️ كمبروسور</button>
      <button class="tfbtn" data-t="electric" onclick="setType('electric',this)">⚡ كهربائي</button>
      <button class="tfbtn" data-t="sensor" onclick="setType('sensor',this)">📡 حساسات</button>
      <button class="tfbtn" data-t="refrigerant" onclick="setType('refrigerant',this)">🧊 تبريد/غاز</button>
      <button class="tfbtn" data-t="communication" onclick="setType('communication',this)">📶 اتصال</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="rbar">
    <div>عرض <span id="vc">0</span> كود من أصل <span id="tc">0</span></div>
    <div class="verified-badge">✅ أكواد موثقة من مصادر رسمية</div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="ico">❄️</div><h3>لا توجد نتائج</h3><p>جرب كلمة بحث مختلفة</p>
  </div>
</div>

<div class="overlay" id="ov" onclick="closeOv(event)">
  <div class="modal">
    <div class="mhead">
      <div>
        <div class="mcode-big" id="mCode"></div>
        <div class="mname" id="mName"></div>
        <div id="mBadges" style="margin-top:6px;"></div>
      </div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody">
      <div class="msec"><div class="msec-title type">🔧 نوع العطل</div><div class="msec-text" id="mType"></div></div>
      <div class="msec"><div class="msec-title cause">⚠️ سبب العطل</div><div class="msec-text" id="mCause"></div></div>
      <div class="msec"><div class="msec-title solution">✅ خطوات الإصلاح</div><ol class="steps" id="mSteps"></ol></div>
      <div class="msec" id="mNS" style="display:none"><div class="msec-title note">📝 ملاحظة مهمة</div><div class="msec-text" id="mNote"></div></div>
      <div class="source-tag">المصدر: <span id="mSrc"></span></div>
    </div>
  </div>
</div>

<script>
const BC={samsung:'#1428a0',lg:'#a50034',general:'#cc0000',haier:'#0072bc',geant:'#1a7a3c',midea:'#e31837',tosot:'#0055a5',wadi:'#ff6b00',balsan:'#b8860b',alhafidh:'#2d7a2d'};
const TC={compressor:'tb-compressor',electric:'tb-electric',sensor:'tb-sensor',refrigerant:'tb-refrigerant',communication:'tb-communication'};
const TL={compressor:'⚙️ كمبروسور',electric:'⚡ كهربائي',sensor:'📡 حساس',refrigerant:'🧊 تبريد/غاز',communication:'📶 اتصال'};
const SC={high:'sev-high',med:'sev-med',low:'sev-low'};
const SL={high:'⚠️ خطورة عالية',med:'🔶 خطورة متوسطة',low:'✅ خطورة منخفضة'};

const faults=[
// ════════════════ SAMSUNG (موثقة - samsung.com + becoolairconditioning) ════════════════
{brand:'samsung',code:'E1 / C1',name:'خطأ حساس درجة حرارة الغرفة',type:'sensor',typeName:'حساس درجة حرارة',severity:'med',
cause:'الثرمستور الداخلي قصير الدارة أو مقطوع، وهو الحساس المسؤول عن قراءة درجة حرارة الغرفة وإرسالها لوحدة التحكم.',
steps:['افصل الجهاز عن الكهرباء 5 دقائق وأعد تشغيله','قس مقاومة الحساس (يجب ~10kΩ عند 25°C)','افحص الأسلاك والتوصيلات','إذا كانت المقاومة خارج النطاق: استبدل الحساس'],
note:'ملاحظة: الكود قد يظهر E1 أو C1 حسب سنة التصنيع والموديل - المعنى واحد',src:'Samsung Support Official (samsung.com)'},

{brand:'samsung',code:'E2 / C2',name:'خطأ حساس التبخير الداخلي (كويل)',type:'sensor',typeName:'حساس درجة حرارة',severity:'med',
cause:'تلف ثرمستور NTC عند لفائف التبخير أو قراءة خاطئة بسبب تجمد الكويل.',
steps:['أوقف الجهاز وانتظر ذوبان الثلج 30 دقيقة','افحص حساس التبخير ومقاومته','تأكد من مستوى الغاز لأن التجمد المتكرر يعني نقص غاز','استبدل الحساس إذا كانت مقاومته خارج النطاق'],
note:'التجمد المتكرر غالباً يشير لنقص غاز أو تسريب',src:'Samsung Support Official + becoolairconditioning.co.uk'},

{brand:'samsung',code:'E3',name:'عطل سويتش الفلوت (تصريف المياه)',type:'electric',typeName:'كهربائي',severity:'med',
cause:'ارتفاع منسوب المياه في صينية التكثيف أو عطل في سويتش الفلوت بسبب انسداد ماسورة التصريف.',
steps:['افحص ماسورة تصريف المياه وتأكد من عدم انسدادها','نظف صينية التكثيف من الأوساخ والطحالب','افحص سويتش الفلوت بصرياً وتأكد من حركته','استبدل سويتش الفلوت إذا كان تالفاً'],
note:'لا تهمل هذا العطل لأن المياه قد تتلف البورد الإلكتروني',src:'Samsung Support Official (samsung.com)'},

{brand:'samsung',code:'E5 / C5',name:'عطل ضبط سويتش الخيار في الوحدة الداخلية',type:'electric',typeName:'كهربائي',severity:'low',

steps:['افحص إعدادات سويتش الخيار (DIP Switch)','تأكد من تطابق الإعدادات مع الوحدة الخارجية','راجع دليل التركيب للإعدادات الصحيحة'],
note:null,src:'Samsung Support Official (samsung.com)'},

{brand:'samsung',code:'E9',name:'عطل تصريف المياه / مضخة التصريف',type:'electric',typeName:'كهربائي',severity:'med',
cause:'انسداد ماسورة التصريف أو عطل في مضخة التصريف مما يسبب تراكم المياه.',
steps:['افحص ماسورة التصريف وانفخ فيها بالهواء لرفع الانسداد','افحص مضخة التصريف وقس تغذيتها الكهربائية','تأكد من ميل الوحدة الداخلية في الاتجاه الصحيح للتصريف','استبدل المضخة إذا كانت تالفة'],

{brand:'samsung',code:'EA',name:'عطل تواصل الوحدة الداخلية والخارجية',type:'communication',typeName:'اتصال',severity:'med',
cause:'قطع أو تأكسد في كابل الاتصال، أو مشكلة في الجهد الكهربائي للإشارة.',

note:null,src:'becoolairconditioning.co.uk'},

{brand:'samsung',code:'CF',name:'تذكير تنظيف الفلتر (ليس عطلاً)',type:'electric',typeName:'تنبيه',severity:'low',

steps:['افحص الحساس ومقاومته','افحص الوصلات','استبدل الحساس إذا لزم'],
note:null,src:'becoolairconditioning.co.uk'},

let aB='all', aT='all';

function getFiltered(){
  const q=document.getElementById('si').value.trim().toLowerCase();
  return faults.filter(f=>{
    const bOk=aB==='all'||f.brand===aB;
    const tOk=aT==='all'||f.type===aT;
    const sOk=!q||f.code.toLowerCase().includes(q)||f.name.includes(q)||f.cause.includes(q)||f.typeName.includes(q)||f.brand.toLowerCase().includes(q)||f.brand.includes(q);
    return bOk&&tOk&&sOk;
  });
}

function render(){
  const data=getFiltered();
  const grid=document.getElementById('grid');
  const empty=document.getElementById('empty');
  document.getElementById('vc').textContent=data.length;
  if(!data.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=data.map((f,i)=>{
    const bc=BC[f.brand]||'#475569';
    const tc=TC[f.type]||'tb-other';
    const sc=SC[f.severity]||'';
    const tl=TL[f.type]||f.typeName;
    const sl=SL[f.severity]||'';
    return `<div class="card" style="animation-delay:${i*.025}s" onclick="openModal(${faults.indexOf(f)})">
      <div class="card-top">
        <div>
          <div class="ccode" style="background:${bc}">${f.code}</div>
          <div class="cbrand-name" style="color:${bc}">${f.brand.toUpperCase()}</div>
        </div>
        <div class="cbadges">
          <span class="cbadge ${tc}">${tl}</span>
          <span class="cbadge ${sc}">${sl}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="fname">${f.name}</div>
        <div class="finfo"><strong>السبب: </strong>${f.cause.length>85?f.cause.substring(0,85)+'...':f.cause}</div>
      </div>
      <div class="card-foot">
        <div class="foot-lbl">✅ الحل</div>
        ${f.steps[0]}${f.steps.length>1?' ...':''}
      </div>
    </div>`;
  }).join('');
}

function openModal(idx){
  const f=faults[idx];
  const bc=BC[f.brand]||'#475569';
  const tc=TC[f.type]||'tb-other';
  const sc=SC[f.severity]||'';
  document.getElementById('mCode').textContent=f.code;
  document.getElementById('mCode').style.background=bc;
  document.getElementById('mName').textContent=f.name;
  document.getElementById('mBadges').innerHTML=`
    <span class="cbadge ${tc}" style="margin-left:5px">${TL[f.type]||f.typeName}</span>
    <span class="cbadge ${sc}">${SL[f.severity]||''}</span>
    <span class="cbadge tb-other">${f.brand.toUpperCase()}</span>`;
  document.getElementById('mType').textContent=f.typeName;
  document.getElementById('mCause').textContent=f.cause;
  document.getElementById('mSteps').innerHTML=f.steps.map((s,i)=>`<li data-n="${i+1}">${s}</li>`).join('');
  document.getElementById('mSrc').textContent=f.src||'مرجع فني';
  if(f.note){document.getElementById('mNS').style.display='block';document.getElementById('mNote').textContent=f.note;}
  else{document.getElementById('mNS').style.display='none';}
  document.getElementById('ov').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeOv(e){if(e.target===document.getElementById('ov'))closeModal();}
function closeModal(){document.getElementById('ov').classList.remove('open');document.body.style.overflow='';}
function setBrand(b,el){aB=b;document.querySelectorAll('.btab').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();}
function setType(t,el){aT=t;document.querySelectorAll('.tfbtn').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.getElementById('sTot').textContent=faults.length;
document.getElementById('tc').textContent=faults.length;
render();
</script>
