<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أكواد أعطال المكيفات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8;
  --surface: #ffffff;
  --surface2: #e8eef5;
  --border: #d1dce8;
  --text: #1a2332;
  --muted: #6b7c93;
  --samsung: #1428a0;
  --lg: #a50034;
  --general: #cc0000;
  --haier: #0072bc;
  --geant: #1a7a3c;
  --other: #6b21a8;
  --compressor: #dc6b19;
  --electric: #b91c1c;
  --sensor: #0369a1;
  --refrigerant: #0d9488;
  --accent: #1e40af;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* TOP BAR */
.topbar {
  background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #0f172a 100%);
  color: white;
  padding: 0 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.topbar-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  gap: 12px;
  flex-wrap: wrap;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: 0 0 20px rgba(56,189,248,0.4);
  flex-shrink: 0;
}

.logo-text h1 { font-size: 18px; font-weight: 900; color: #e2e8f0; }
.logo-text p { font-size: 10px; color: #94a3b8; letter-spacing: 1px; }

.stats {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.stat {
  text-align: center;
  background: rgba(255,255,255,0.07);
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
}

.stat-n { font-size: 20px; font-weight: 900; color: #38bdf8; font-family: 'IBM Plex Mono', monospace; }
.stat-l { font-size: 10px; color: #94a3b8; }

/* SEARCH */
.search-wrap {
  background: linear-gradient(180deg, #1e3a5f 0%, #f0f4f8 100%);
  padding: 28px 20px 24px;
}

.search-inner { max-width: 750px; margin: 0 auto; }

.search-box {
  position: relative;
  margin-bottom: 14px;
}

.search-box input {
  width: 100%;
  padding: 15px 52px 15px 20px;
  border-radius: 14px;
  border: 2px solid var(--border);
  background: white;
  font-size: 15px;
  font-family: 'Cairo', sans-serif;
  color: var(--text);
  outline: none;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.search-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(30,64,175,0.1);
}

.search-box input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 17px; top: 50%; transform: translateY(-50%); font-size: 20px; pointer-events: none; }

/* BRAND TABS */
.brand-tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.brand-tab {
  padding: 7px 16px;
  border-radius: 30px;
  border: 2px solid transparent;
  background: white;
  font-size: 13px;
  font-family: 'Cairo', sans-serif;
  cursor: pointer;
  font-weight: 700;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  color: var(--muted);
}

.brand-tab[data-brand="all"].active, .brand-tab[data-brand="all"]:hover { background: #0f172a; color: white; border-color: #0f172a; }
.brand-tab[data-brand="samsung"].active, .brand-tab[data-brand="samsung"]:hover { background: var(--samsung); color: white; border-color: var(--samsung); }
.brand-tab[data-brand="lg"].active, .brand-tab[data-brand="lg"]:hover { background: var(--lg); color: white; border-color: var(--lg); }
.brand-tab[data-brand="general"].active, .brand-tab[data-brand="general"]:hover { background: var(--general); color: white; border-color: var(--general); }
.brand-tab[data-brand="haier"].active, .brand-tab[data-brand="haier"]:hover { background: var(--haier); color: white; border-color: var(--haier); }
.brand-tab[data-brand="geant"].active, .brand-tab[data-brand="geant"]:hover { background: var(--geant); color: white; border-color: var(--geant); }

/* TYPE FILTERS */
.type-filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.type-btn {
  padding: 5px 13px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: white;
  font-size: 12px;
  font-family: 'Cairo', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--muted);
}

.type-btn.active, .type-btn:hover { color: white; }
.type-btn[data-type="all"].active { background: #475569; border-color: #475569; }
.type-btn[data-type="compressor"].active { background: var(--compressor); border-color: var(--compressor); }
.type-btn[data-type="electric"].active { background: var(--electric); border-color: var(--electric); }
.type-btn[data-type="sensor"].active { background: var(--sensor); border-color: var(--sensor); }
.type-btn[data-type="refrigerant"].active { background: var(--refrigerant); border-color: var(--refrigerant); }
.type-btn[data-type="communication"].active { background: var(--other); border-color: var(--other); }

/* MAIN */
.main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px;
}

.results-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--muted);
  flex-wrap: wrap;
  gap: 8px;
}

.results-bar span { color: var(--accent); font-weight: 700; }

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
}

.card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  cursor: pointer;
  transition: all 0.25s;
  animation: up 0.35s ease forwards;
  opacity: 0;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  border-color: #93c5fd;
}

@keyframes up { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

.card-top {
  padding: 14px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}

.code-wrap { display: flex; align-items: center; gap: 10px; }

.code {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 8px;
  color: white;
  letter-spacing: 1px;
}

.brand-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.badges { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

.badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
}

.card-body { padding: 12px 16px; }

.fault-name {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text);
  line-height: 1.4;
}

.info { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 4px; }
.info strong { color: var(--text); font-weight: 600; }

.card-foot {
  padding: 10px 16px;
  background: #f8fafc;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: #166534;
  line-height: 1.5;
}

.foot-label { font-weight: 700; color: #15803d; margin-bottom: 3px; }

/* brand colors */
.bg-samsung { background: var(--samsung); }
.bg-lg { background: var(--lg); }
.bg-general { background: var(--general); }
.bg-haier { background: var(--haier); }
.bg-geant { background: var(--geant); }
.bg-other { background: var(--other); }

.dot-samsung { background: var(--samsung); }
.dot-lg { background: var(--lg); }
.dot-general { background: var(--general); }
.dot-haier { background: var(--haier); }
.dot-geant { background: var(--geant); }
.dot-other { background: var(--other); }

/* type badge colors */
.tb-compressor { background: #fef3c7; color: #92400e; }
.tb-electric { background: #fee2e2; color: #991b1b; }
.tb-sensor { background: #dbeafe; color: #1e40af; }
.tb-refrigerant { background: #ccfbf1; color: #134e4a; }
.tb-communication { background: #ede9fe; color: #5b21b6; }
.tb-other { background: #f1f5f9; color: #475569; }

/* severity */
.sev-high { background: #fee2e2; color: #991b1b; }
.sev-med { background: #fef3c7; color: #92400e; }
.sev-low { background: #dcfce7; color: #166534; }

/* MODAL */
.overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.75);
  z-index: 300;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  backdrop-filter: blur(6px);
}
.overlay.open { opacity:1; pointer-events: all; }

.modal {
  background: white;
  border-radius: 20px;
  max-width: 580px; width: 100%;
  max-height: 88vh; overflow-y: auto;
  transform: scale(0.92);
  transition: transform 0.3s;
  box-shadow: 0 25px 60px rgba(0,0,0,0.3);
}
.overlay.open .modal { transform: scale(1); }

.modal-head {
  padding: 22px 22px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-start; gap: 14px;
  position: sticky; top: 0; background: white; z-index: 1;
}

.modal-code-big {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 34px; font-weight: 700;
  padding: 6px 16px;
  border-radius: 12px;
  color: white;
  display: inline-block;
  margin-bottom: 6px;
}

.modal-name { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.modal-close {
  width: 34px; height: 34px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.modal-close:hover { background: #fee2e2; border-color: #fca5a5; }

.modal-body { padding: 20px; }

.msec { margin-bottom: 18px; }
.msec-title {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  padding-bottom: 7px; border-bottom: 2px solid var(--border); margin-bottom: 10px;
}
.msec-title.cause { color: var(--electric); border-color: #fee2e2; }
.msec-title.solution { color: #15803d; border-color: #dcfce7; }
.msec-title.type { color: var(--sensor); border-color: #dbeafe; }
.msec-title.note { color: var(--compressor); border-color: #fef3c7; }

.msec-text { font-size: 14px; line-height: 1.9; color: var(--text); }

.steps { list-style: none; }
.steps li {
  padding: 8px 12px 8px 36px;
  position: relative;
  font-size: 13px;
  line-height: 1.7;
  border-radius: 8px;
  margin-bottom: 6px;
  background: #f8fafc;
}
.steps li::before {
  content: attr(data-n);
  position: absolute; right: 12px; top: 10px;
  width: 20px; height: 20px;
  background: var(--accent); color: white;
  border-radius: 50%; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}

/* NO RESULTS */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty .ico { font-size: 52px; margin-bottom: 14px; }
.empty h3 { font-size: 18px; color: var(--text); margin-bottom: 6px; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media(max-width:600px){
  .grid { grid-template-columns: 1fr; }
  .stats { display: none; }
  .modal-code-big { font-size: 26px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">
      <div class="logo-icon">❄️</div>
      <div class="logo-text">
        <h1>أكواد أعطال المكيفات</h1>
        <p>AC FAULT CODE DIAGNOSTIC SYSTEM</p>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="sTot">0</div><div class="stat-l">إجمالي الأكواد</div></div>
      <div class="stat"><div class="stat-n" id="sBrands">5</div><div class="stat-l">ماركة</div></div>
    </div>
  </div>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="ابحث بالكود مثل E1، أو اسم العطل، أو السبب..." oninput="render()">
      <span class="search-icon">🔍</span>
    </div>
    <div class="brand-tabs" id="brandTabs">
      <button class="brand-tab active" data-brand="all" onclick="setBrand('all',this)">🌐 الكل</button>
      <button class="brand-tab" data-brand="samsung" onclick="setBrand('samsung',this)">Samsung</button>
      <button class="brand-tab" data-brand="lg" onclick="setBrand('lg',this)">LG</button>
      <button class="brand-tab" data-brand="general" onclick="setBrand('general',this)">General</button>
      <button class="brand-tab" data-brand="haier" onclick="setBrand('haier',this)">Haier</button>
      <button class="brand-tab" data-brand="geant" onclick="setBrand('geant',this)">Géant/Artico</button>
    </div>
    <div class="type-filters" id="typeFilters">
      <button class="type-btn active" data-type="all" onclick="setType('all',this)">الكل</button>
      <button class="type-btn" data-type="compressor" onclick="setType('compressor',this)">🔧 الكمبروسور</button>
      <button class="type-btn" data-type="electric" onclick="setType('electric',this)">⚡ كهربائي</button>
      <button class="type-btn" data-type="sensor" onclick="setType('sensor',this)">📡 حساسات</button>
      <button class="type-btn" data-type="refrigerant" onclick="setType('refrigerant',this)">🧊 التبريد والغاز</button>
      <button class="type-btn" data-type="communication" onclick="setType('communication',this)">📶 اتصال</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="results-bar">
    <div>عرض <span id="visCount">0</span> كود عطل</div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="ico">❄️</div>
    <h3>لا توجد نتائج</h3>
    <p>جرب كلمة بحث مختلفة أو غير الفلتر</p>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div>
        <div class="modal-code-big" id="mCode"></div>
        <div class="modal-name" id="mName"></div>
        <div id="mBadges"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="msec">
        <div class="msec-title type">🔧 نوع العطل</div>
        <div class="msec-text" id="mTypeTxt"></div>
      </div>
      <div class="msec">
        <div class="msec-title cause">⚠️ سبب العطل</div>
        <div class="msec-text" id="mCause"></div>
      </div>
      <div class="msec">
        <div class="msec-title solution">✅ خطوات الإصلاح</div>
        <ol class="steps" id="mSteps"></ol>
      </div>
      <div class="msec" id="mNoteSec" style="display:none">
        <div class="msec-title note">📝 ملاحظة مهمة</div>
        <div class="msec-text" id="mNote"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ===================== DATA =====================
const faults = [
  // ===== SAMSUNG =====

  { brand:'samsung', code:'E7', name:'عطل مروحة الوحدة الداخلية', type:'electric', typeName:'كهربائي', severity:'med',

// ===================== LOGIC =====================
let activeBrand = 'all';
let activeType = 'all';

const brandColors = { samsung:'#1428a0', lg:'#a50034', general:'#cc0000', haier:'#0072bc', geant:'#1a7a3c', other:'#6b21a8' };
const typeClasses = { compressor:'tb-compressor', electric:'tb-electric', sensor:'tb-sensor', refrigerant:'tb-refrigerant', communication:'tb-communication', other:'tb-other' };
const sevClasses = { high:'sev-high', med:'sev-med', low:'sev-low' };
const sevLabels = { high:'خطورة عالية', med:'خطورة متوسطة', low:'خطورة منخفضة' };
const typeLabels = { compressor:'⚙️ كمبروسور', electric:'⚡ كهربائي', sensor:'📡 حساس', refrigerant:'🧊 تبريد/غاز', communication:'📶 اتصال', other:'أخرى' };

function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return faults.filter(f => {
    const bOk = activeBrand === 'all' || f.brand === activeBrand;
    const tOk = activeType === 'all' || f.type === activeType;
    const sOk = !q || f.code.toLowerCase().includes(q) || f.name.includes(q) || f.cause.includes(q) || f.typeName.includes(q);
    return bOk && tOk && sOk;
  });
}

function render() {
  const data = getFiltered();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  document.getElementById('visCount').textContent = data.length;

  if (!data.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  grid.innerHTML = data.map((f, i) => {
    const bc = brandColors[f.brand] || brandColors.other;
    const tc = typeClasses[f.type] || typeClasses.other;
    const sc = sevClasses[f.severity] || '';
    const tl = typeLabels[f.type] || f.typeName;
    const sl = sevLabels[f.severity] || '';
    const bn = f.brand.toUpperCase();
    return `
    <div class="card" style="animation-delay:${i*0.03}s" onclick="openModal(${faults.indexOf(f)})">
      <div class="card-top">
        <div class="code-wrap">
          <div class="brand-dot dot-${f.brand}"></div>
          <div class="code bg-${f.brand}">${f.code}</div>
          <span style="font-size:11px;font-weight:700;color:${bc}">${bn}</span>
        </div>
        <div class="badges">
          <span class="badge ${tc}">${tl}</span>
          <span class="badge ${sc}">${sl}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="fault-name">${f.name}</div>
        <div class="info"><strong>السبب: </strong>${f.cause.length > 85 ? f.cause.substring(0,85)+'...' : f.cause}</div>
      </div>
      <div class="card-foot">
        <div class="foot-label">✅ الحل</div>
        ${f.steps[0]}${f.steps.length > 1 ? ' ...' : ''}
      </div>
    </div>`;
  }).join('');
}

function openModal(idx) {
  const f = faults[idx];
  const bc = brandColors[f.brand] || brandColors.other;
  const tc = typeClasses[f.type] || typeClasses.other;
  const sc = sevClasses[f.severity] || '';

  document.getElementById('mCode').textContent = f.code;
  document.getElementById('mCode').style.background = bc;
  document.getElementById('mName').textContent = f.name;
  document.getElementById('mBadges').innerHTML = `
    <span class="badge ${tc}" style="margin-left:6px">${typeLabels[f.type]||f.typeName}</span>
    <span class="badge ${sc}">${sevLabels[f.severity]||''}</span>
    <span class="badge" style="background:#f1f5f9;color:#475569">${f.brand.toUpperCase()}</span>`;
  document.getElementById('mTypeTxt').textContent = f.typeName;
  document.getElementById('mCause').textContent = f.cause;
  document.getElementById('mSteps').innerHTML = f.steps.map((s,i)=>`<li data-n="${i+1}">${s}</li>`).join('');

  if (f.note) {
    document.getElementById('mNoteSec').style.display = 'block';
    document.getElementById('mNote').textContent = f.note;
  } else {
    document.getElementById('mNoteSec').style.display = 'none';
  }

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeOverlay(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow = ''; }

function setBrand(b, el) {
  activeBrand = b;
  document.querySelectorAll('.brand-tab').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setType(t, el) {
  activeType = t;
  document.querySelectorAll('.type-btn').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  render();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.getElementById('sTot').textContent = faults.length;
render();
</script>
